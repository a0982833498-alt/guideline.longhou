<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>瀧厚 LONGHOU — Brand Guideline 2025</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:ital,wght@0,300;0,400;0,500;0,700;1,400&family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#012450; --navy-dark:#011830; --navy-mid:#012450;
  --yellow:#FFDD16; --yellow-deep:#C9A800;
  --white:#FFFFFF; --cream:#F8F6F1;
  --border:rgba(0,0,0,0.08); --gray:#6B6861; --gray-light:#EDEAE4;
  --radius:4px;
}
html{scroll-behavior:smooth;}
body{font-family:'Barlow',sans-serif;background:var(--cream);color:var(--navy-dark);font-size:15px;line-height:1.6;}

/* COVER */
.cover{
  background:var(--navy); min-height:100vh;
  display:flex;flex-direction:column;justify-content:space-between;
  padding:2.5rem 3rem; position:relative; overflow:hidden;
}
.cover::before{
  content:''; position:absolute; top:-80px; right:-80px;
  width:420px;height:420px; border-radius:50%;
  border:60px solid rgba(255,221,22,0.06); pointer-events:none;
}
.cover::after{
  content:''; position:absolute; bottom:-60px; right:80px;
  width:280px;height:280px; border-radius:50%;
  border:40px solid rgba(255,221,22,0.04); pointer-events:none;
}
.cover-wm{
  position:absolute; bottom:-30px; right:-10px;
  font-family:'Barlow Condensed',sans-serif;
  font-size:260px;font-weight:900;
  color:rgba(255,255,255,0.025); line-height:1;
  pointer-events:none; user-select:none; letter-spacing:-6px;
}
.cover-top{
  display:flex;align-items:center;justify-content:space-between;
  position:relative;z-index:1;
}
.logo-lk{display:flex;align-items:center;gap:12px;}
.logo-bull{
  width:48px;height:48px;background:var(--yellow);border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;
}
.logo-brand{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:900;color:var(--white);letter-spacing:2px;}
.logo-sub{font-size:10px;color:rgba(255,255,255,0.4);letter-spacing:2px;}
.cover-badge{font-size:10px;letter-spacing:2px;color:rgba(255,255,255,0.3);text-transform:uppercase;}
.cover-body{position:relative;z-index:1;padding:5rem 0 3rem;}
.cover-ey{
  font-size:10px;font-weight:700;letter-spacing:4px;
  color:var(--yellow);text-transform:uppercase;
  margin-bottom:1.5rem;display:flex;align-items:center;gap:12px;
}
.cover-ey::before{content:'';display:inline-block;width:28px;height:2px;background:var(--yellow);}
.cover-h1{
  font-family:'Barlow Condensed',sans-serif;
  font-size:clamp(68px,10vw,110px);font-weight:900;
  line-height:.88;letter-spacing:-2px;color:var(--white);margin-bottom:.5rem;
}
.cover-h1 span{color:var(--yellow);}
.cover-tl{font-size:14px;color:rgba(255,255,255,.45);letter-spacing:1px;margin-top:1.75rem;margin-bottom:2.5rem;}
.cover-pills{display:flex;gap:8px;flex-wrap:wrap;}
.cover-pill{border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:4px 14px;font-size:11px;color:rgba(255,255,255,.4);letter-spacing:1px;}
.cover-ft{
  position:relative;z-index:1;
  display:flex;justify-content:space-between;align-items:flex-end;
  padding-top:2rem;border-top:1px solid rgba(255,255,255,.07);
}
.cover-ft-l{font-size:11px;color:rgba(255,255,255,.2);line-height:1.8;}
.cover-ft-r{font-family:'Barlow Condensed',sans-serif;font-size:56px;font-weight:900;color:rgba(255,255,255,.04);letter-spacing:2px;}

/* NAV */
.sticky-nav{
  position:sticky;top:0;z-index:100;
  background:var(--yellow);border-bottom:3px solid var(--navy);
  display:flex;overflow-x:auto;scrollbar-width:none;
}
.sticky-nav::-webkit-scrollbar{display:none;}
.nav-btn{
  padding:13px 22px;font-size:11px;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;color:var(--navy-dark);
  background:none;border:none;border-bottom:3px solid transparent;
  margin-bottom:-3px;cursor:pointer;white-space:nowrap;
  transition:background .15s;font-family:'Barlow',sans-serif;
}
.nav-btn:hover{background:rgba(1,36,80,.08);}
.nav-btn.active{background:rgba(1,36,80,.12);border-bottom-color:var(--navy);}

/* CONTENT */
.content{padding:3rem 2rem 4rem;max-width:900px;margin:0 auto;}
.page{display:none;}
.page.active{display:block;}

/* SECTION HEADER */
.sec-ey{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--navy);margin-bottom:.4rem;}
.sec-title{
  font-family:'Barlow Condensed',sans-serif;font-size:46px;font-weight:900;
  text-transform:uppercase;color:var(--navy-dark);line-height:.95;margin-bottom:2.5rem;
}

/* CARD */
.card{background:var(--white);border-radius:var(--radius);border:.5px solid var(--border);padding:1.5rem 1.75rem;margin-bottom:1rem;}
.card-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--navy);margin-bottom:1rem;}
.divider{height:.5px;background:var(--border);margin:1.25rem 0;}

/* BRAND FOUNDATION */
.mission-box{
  background:var(--navy);border-radius:var(--radius);padding:2.25rem 2.5rem;
  margin-bottom:1rem;position:relative;overflow:hidden;
}
.mission-box::before{
  content:'"';position:absolute;top:-30px;left:16px;
  font-family:'Barlow Condensed',sans-serif;font-size:200px;font-weight:900;
  color:rgba(255,221,22,.06);line-height:1;pointer-events:none;
}
.mission-main{
  font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:700;
  color:var(--yellow);line-height:1.2;margin-bottom:.75rem;position:relative;
}
.mission-sub{font-size:13px;color:rgba(255,255,255,.45);line-height:1.8;position:relative;}

.values-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem;}
.val-card{
  background:var(--white);border-radius:var(--radius);
  border:.5px solid var(--border);border-top:3px solid var(--navy);
  padding:1.25rem 1.5rem;
}
.val-num{
  font-family:'Barlow Condensed',sans-serif;font-size:44px;font-weight:900;
  color:var(--yellow);-webkit-text-stroke:1.5px var(--navy);line-height:1;margin-bottom:4px;
}
.val-name{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--navy);margin-bottom:8px;}
.val-desc{font-size:13px;color:var(--gray);line-height:1.7;}

.persona-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.persona-card{
  background:var(--cream);border-radius:var(--radius);
  border:.5px solid var(--border);padding:1.1rem 1rem;text-align:center;
}
.persona-icon{
  width:42px;height:42px;background:var(--navy);border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:18px;margin:0 auto .6rem;
}
.persona-name{font-size:12px;font-weight:700;color:var(--navy);margin-bottom:3px;}
.persona-age{font-size:10px;color:var(--yellow-deep);margin-bottom:6px;letter-spacing:1px;font-weight:700;}
.persona-desc{font-size:11px;color:var(--gray);line-height:1.6;}
.kw-row{display:flex;flex-wrap:wrap;gap:8px;}
.kw-chip{background:var(--navy);color:var(--yellow);font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:6px 16px;border-radius:2px;}

/* COLOR */
.color-hero-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1rem;}
.color-hero{border-radius:var(--radius);overflow:hidden;border:.5px solid var(--border);}
.c-swatch{height:130px;display:flex;align-items:flex-end;padding:1rem 1.25rem;}
.c-swatch-name{font-family:'Barlow Condensed',sans-serif;font-size:34px;font-weight:900;line-height:1;}
.c-info{padding:.85rem 1.25rem;background:var(--white);}
.c-label{font-size:13px;font-weight:700;}
.c-hex{font-size:11px;color:var(--gray);font-family:monospace;margin-top:1px;}
.c-role{font-size:11px;color:var(--gray);margin-top:3px;}
.color-sec-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem;}
.c-mini{border-radius:var(--radius);overflow:hidden;border:.5px solid var(--border);}
.c-mini-sw{height:56px;}
.c-mini-info{padding:.45rem .7rem;background:var(--white);}
.c-mini-name{font-size:11px;font-weight:700;color:var(--navy-dark);}
.c-mini-hex{font-size:10px;color:var(--gray);font-family:monospace;}
.ratio-bar{background:var(--white);border-radius:var(--radius);border:.5px solid var(--border);padding:1.25rem 1.5rem;margin-bottom:1rem;}
.ratio-track{display:flex;height:14px;border-radius:2px;overflow:hidden;margin:.75rem 0;}
.ratio-seg{height:100%;}
.ratio-labels{display:flex;gap:1.5rem;margin-top:8px;flex-wrap:wrap;}
.ratio-label{font-size:11px;color:var(--gray);display:flex;align-items:center;gap:6px;}
.ratio-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0;}
.rule-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.rule-box{border-radius:var(--radius);padding:1rem 1.25rem;}
.rule-box-title{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:.6rem;}
.rule-box ul{list-style:none;}
.rule-box ul li{font-size:12px;color:var(--gray);padding:3px 0 3px 14px;position:relative;line-height:1.55;}
.rule-box ul li::before{content:'—';position:absolute;left:0;color:#bbb;}
.do-box{background:#EAF3DE;}.do-title{color:#2e6b09;}
.dont-box{background:#FDEAEA;}.dont-title{color:#9c1f1f;}

/* TONE */
.tone-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem;}
.tone-card{background:var(--white);border-radius:var(--radius);border:.5px solid var(--border);border-top:3px solid var(--navy);padding:1.1rem 1.25rem;}
.tone-kw{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:6px;}
.tone-desc{font-size:12px;color:var(--gray);line-height:1.6;margin-bottom:.75rem;}
.tone-eg{font-size:12px;color:var(--gray);font-style:italic;padding:8px 12px;background:var(--cream);border-radius:var(--radius);border-left:3px solid var(--yellow);line-height:1.6;}
.tone-vs{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.tone-yes{background:var(--white);border-left:4px solid var(--navy);border-radius:0 var(--radius) var(--radius) 0;padding:1rem 1.25rem;}
.tone-no{background:var(--white);border-left:4px solid var(--gray-light);border-radius:0 var(--radius) var(--radius) 0;padding:1rem 1.25rem;opacity:.7;}
.tone-tag{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:.5rem;}
.tone-yes .tone-tag{color:var(--navy);}
.tone-no .tone-tag{color:var(--gray);}
.tone-yes p,.tone-no p{font-size:13px;color:var(--gray);line-height:1.7;}

/* APP */
.app-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.app-card{border-radius:var(--radius);overflow:hidden;border:.5px solid var(--border);}
.app-label{padding:8px 14px;background:var(--navy);font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--yellow);}
.app-inner{padding:1.25rem;background:var(--white);}
.app-img{width:100%;border-radius:var(--radius);display:block;}
.app-img-caption{font-size:11px;color:var(--gray);margin-top:.6rem;line-height:1.5;}

.photo-guide{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:1rem;}
.photo-box{border-radius:var(--radius);padding:1rem 1.1rem;}
.photo-box-title{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:.5rem;}
.photo-box ul{list-style:none;}
.photo-box ul li{font-size:12px;color:var(--gray);padding:3px 0;line-height:1.55;}

.closing-box{background:var(--navy);border-radius:var(--radius);padding:2rem 2.5rem;margin-top:1.5rem;}
.closing-q{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:700;color:var(--yellow);line-height:1.3;margin-bottom:.75rem;}
.closing-attr{font-size:10px;color:rgba(255,255,255,.25);letter-spacing:2px;}

@media(max-width:600px){
  .values-grid,.persona-row,.tone-grid,.app-grid,.rule-grid,.photo-guide,.tone-vs,.color-hero-grid{grid-template-columns:1fr;}
  .color-sec-grid{grid-template-columns:1fr 1fr;}
  .cover{padding:1.5rem;}
  .cover-h1{font-size:56px;}
}

/* ACCORDION */
.val-card { cursor: pointer; }
.val-card .val-toggle {
  display: flex; align-items: center; justify-content: space-between;
}
.val-chevron {
  font-size: 13px; color: var(--gray);
  transition: transform .25s; flex-shrink: 0; margin-left: 8px;
}
.val-card.open .val-chevron { transform: rotate(180deg); }
.val-detail {
  display: none; margin-top: 1rem;
  padding-top: 1rem; border-top: .5px solid var(--border);
}
.val-card.open .val-detail { display: block; }
.val-detail-imgs {
  display: grid; gap: 8px;
}
.val-detail-imgs.cols-1 { grid-template-columns: 1fr; }
.val-detail-imgs.cols-2 { grid-template-columns: 1fr 1fr; }
.val-detail-imgs.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
.val-detail-img {
  width: 100%; border-radius: 3px; display: block;
  object-fit: cover; max-height: 260px;
}
.val-detail-cap {
  font-size: 11px; color: var(--gray);
  margin-top: 5px; line-height: 1.5; text-align: center;
}
.val-hint {
  font-size: 10px; color: var(--yellow-deep);
  letter-spacing: 1px; font-weight: 700;
  margin-top: 6px;
}
</style>
</head>
<body>

<!-- COVER -->
<div class="cover">
  <div class="cover-wm">LONGHOU</div>
  <div class="cover-top">
    <div class="logo-lk">
      <div class="logo-bull" style="background:transparent;padding:0;overflow:hidden;"><img src="data:image/png;base64," alt="瀧厚 Long Hou Logo" style="width:100%;height:100%;object-fit:contain;border-radius:50%;"></div>
      <div>
        <div class="logo-brand">LONG HOU</div>
        <div class="logo-sub">STEAK HOUSE · 瀧厚牛排</div>
      </div>
    </div>
    <div class="cover-badge">Brand Guideline · 2025</div>
  </div>
  <div class="cover-body">
    <div class="cover-ey">品牌識別系統</div>
    <h1 class="cover-h1">LONG<br>HOU<br><span>STEAK</span><br><span>HOUSE</span></h1>
    <p class="cover-tl">英倫質感 × 好鄰居精神　·　可靠的質感 · 輕鬆的日常</p>
    <div class="cover-pills">
      <span class="cover-pill">British Quality</span>
      <span class="cover-pill">Neighbourhood Spirit</span>
      <span class="cover-pill">#012450 × #FFDD16</span>
      <span class="cover-pill">Version 1.0</span>
    </div>
  </div>
  <div class="cover-ft">
    <div class="cover-ft-l">機密文件 · Confidential<br>未經授權，禁止複製或發佈</div>
    <div class="cover-ft-r">2025</div>
  </div>
</div>

<!-- NAV -->
<nav class="sticky-nav">
  <button class="nav-btn active" onclick="showPage('brand',this)">01 品牌核心</button>
  <button class="nav-btn" onclick="showPage('color',this)">02 色彩系統</button>
  <button class="nav-btn" onclick="showPage('app',this)">03 應用示範</button>
</nav>

<div class="content">

<!-- ======================== PAGE 01: BRAND ======================== -->
<div class="page active" id="page-brand">
  <p class="sec-ey">01 · Brand Foundation</p>
  <h2 class="sec-title">品牌核心</h2>

  <div class="mission-box">
    <p class="mission-main">可靠的質感 × 輕鬆的日常</p>
    <p class="mission-sub">提供一個既體面又不過於拘謹的餐飲環境<br>讓每一次到訪，都是值得被好好對待的時刻。</p>
  </div>

  <div class="values-grid">

      <!-- 01 -->
      <div class="val-card" onclick="toggleVal(this)">
        <div class="val-toggle">
          <div>
            <div class="val-num">01</div>
            <div class="val-name">英倫質感風</div>
          </div>
          <span class="val-chevron">▼</span>
        </div>
        <p class="val-desc">講究肉品品質與用餐環境的可靠空間。可以體面且安心地好好享受餐點。</p>
        <p class="val-hint">▸ 點擊查看空間實景</p>
        <div class="val-detail">
          <div class="val-detail-imgs cols-1">
            <div>
              <img class="val-detail-img" src="data:image/jpeg;base64," alt="瀧厚餐廳空間">
              <p class="val-detail-cap">LONGHOU STEAK HOUSE · 深藍英倫氛圍的用餐空間，每個細節都在說品牌的故事。</p>
            </div>
          </div>
        </div>
      </div>

      <!-- 02 -->
      <div class="val-card" onclick="toggleVal(this)">
        <div class="val-toggle">
          <div>
            <div class="val-num">02</div>
            <div class="val-name">重視小細節</div>
          </div>
          <span class="val-chevron">▼</span>
        </div>
        <p class="val-desc">選品不馬虎，從刀叉到肉品的選擇，輕鬆享受有品質的日常。</p>
        <p class="val-hint">▸ 點擊查看品質細節</p>
        <div class="val-detail">
          <div class="val-detail-imgs cols-1">
            <div>
              <img class="val-detail-img" src="data:image/jpeg;base64," alt="Laguiole 牛排刀">
              <p class="val-detail-cap">法國 Laguiole 頂級牛排刀 · 搭配原塊牛肉，從備料到餐具每一環節都不妥協。</p>
            </div>
          </div>
        </div>
      </div>

      <!-- 03 -->
      <div class="val-card" onclick="toggleVal(this)">
        <div class="val-toggle">
          <div>
            <div class="val-num">03</div>
            <div class="val-name">建立熟客基礎</div>
          </div>
          <span class="val-chevron">▼</span>
        </div>
        <p class="val-desc">重視與每個人的連結性，擁有強大且有感的會員熟客好禮機制。</p>
        <p class="val-hint">▸ 點擊查看熟客好禮</p>
        <div class="val-detail">
          <div class="val-detail-imgs cols-1">
            <div>
              <img class="val-detail-img" src="data:image/jpeg;base64," alt="VIP熟客好禮">
              <p class="val-detail-cap">VIP 限定 · 專屬熟客好禮——讓每一位回頭的她都感覺被記得、被珍視。</p>
            </div>
          </div>
        </div>
      </div>

      <!-- 04 -->
      <div class="val-card" onclick="toggleVal(this)">
        <div class="val-toggle">
          <div>
            <div class="val-num">04</div>
            <div class="val-name">日常輕鬆</div>
          </div>
          <span class="val-chevron">▼</span>
        </div>
        <p class="val-desc">擁有舒適插座與座椅，親切放鬆且價錢友善的用餐空間。</p>
        <p class="val-hint">▸ 點擊查看空間體驗</p>
        <div class="val-detail">
          <div class="val-detail-imgs cols-3">
            <div>
              <img class="val-detail-img" src="data:image/jpeg;base64," alt="座位插座" style="max-height:200px;">
              <p class="val-detail-cap">每個座位皆配備插座，久坐也安心。</p>
            </div>
            <div>
              <img class="val-detail-img" src="data:image/jpeg;base64," alt="免費羅宋湯" style="max-height:200px;">
              <p class="val-detail-cap">免費無限供應羅宋湯，暖胃暖心。</p>
            </div>
            <div>
              <img class="val-detail-img" src="data:image/jpeg;base64," alt="豐盛套餐" style="max-height:200px;">
              <p class="val-detail-cap">價格友善的豐盛套餐，每一口都值得。</p>
            </div>
          </div>
        </div>
      </div>

    </div>

  <!-- Color rationale card -->
  <div class="card" style="background:var(--navy);border:none;margin-top:1rem;position:relative;overflow:hidden;">
    <div style="position:absolute;right:-20px;top:-20px;width:140px;height:140px;border-radius:50%;border:30px solid rgba(255,221,22,0.08);pointer-events:none;"></div>
    <div style="position:absolute;right:30px;bottom:-30px;width:90px;height:90px;border-radius:50%;border:20px solid rgba(255,221,22,0.05);pointer-events:none;"></div>
    <p class="card-label" style="color:var(--yellow);">配色理念 · Color Rationale</p>
    <div style="display:flex;align-items:stretch;gap:12px;margin-bottom:1.25rem;">
