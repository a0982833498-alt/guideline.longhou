  <div class="rule-grid">
    <div class="rule-box do-box">
      <p class="rule-box-title do-title">使用原則</p>
      <ul>
        <li>深藍與金黃是最強識別，主視覺優先同時使用</li>
        <li>白底上用深藍文字，深藍底上用金黃或白色文字</li>
        <li>金黃不超過畫面佔比 10–15%，保持衝擊感</li>
        <li>Cream White 用於輕鬆版面或輔助背景</li>
        <li>確保文字與背景符合 WCAG AA 對比度標準</li>
      </ul>
    </div>
    <div class="rule-box dont-box">
      <p class="rule-box-title dont-title">絕對禁止</p>
      <ul>
        <li>調整品牌藍或品牌黃的色相、明度、飽和度</li>
        <li>在標誌上加漸層、陰影或其他顏色</li>
        <li>使用霓虹、螢光、高飽和彩色作主視覺</li>
        <li>金黃色文字放在白色背景（對比不足）</li>
        <li>多種彩色混用，破壞品牌識別感</li>
      </ul>
    </div>
  </div>
