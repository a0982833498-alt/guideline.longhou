    <div class="ratio-track">
      <div class="ratio-seg" style="width:60%;background:#012450;"></div>
      <div class="ratio-seg" style="width:30%;background:#F8F6F1;border-top:1px solid #ddd;border-bottom:1px solid #ddd;"></div>
