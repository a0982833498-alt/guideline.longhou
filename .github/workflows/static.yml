    </div>
    <div class="ratio-labels">
      <span class="ratio-label"><span class="ratio-dot" style="background:#012450;"></span>60% 深藍底色</span>
      <span class="ratio-label"><span class="ratio-dot" style="background:#EDEAE4;border:1px solid #ddd;"></span>30% 白色 / 米白輔助</span>
